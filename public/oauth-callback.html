<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Provider connected — ZitoAI</title><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/styles.css"></head><body><main class="oauth-result"><img src="/assets/zito-logo.png" alt="ZitoAI"><p class="eyebrow">Provider connection</p><h1 id="oauth-title">Connection received.</h1><p id="oauth-message">You can close this window and return to ZitoAI.</p><p><a class="secondary-button" href="/">Return to ZitoAI</a></p></main><script>const p=new URLSearchParams(location.search);if(p.get('error')){document.querySelector('#oauth-title').textContent='Connection failed.';document.querySelector('#oauth-message').textContent=p.get('error_description')||p.get('error')}else if(p.get('provider')){document.querySelector('#oauth-message').textContent=`${p.get('provider')} is connected. You can return to ZitoAI.`}</script></body></html>
